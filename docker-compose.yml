services:
  kinombackend:
    container_name: kinombackend
    build: .
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - kinom
    restart: unless-stopped

  kinom:
    image: mongo:6
    container_name: kinom
    ports:
      - "27017:27017"
    volumes:
      - kinom-data:/data/db
    restart: unless-stopped

volumes:
  kinom-data:
