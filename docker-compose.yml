services:
  backend:
    container_name: kinom-backend
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: kinom-backend-mongo
    expose:
      - "27017"
    volumes:
      - kinom-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  kinom-data:
